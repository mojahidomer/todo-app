name: Claude Repository Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # needed so Claude can post the review as a PR comment
      id-token: write

    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history, not just the latest commit — needed to review the entire repo, not only the diff

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review the ENTIRE repository checked out at the current working directory
            (not just the PR diff). Walk the full file tree, read each source file,
            and produce a code review covering:

            1. Correctness & bugs (logic errors, unhandled edge cases, race conditions)
            2. Security vulnerabilities (hardcoded secrets, injection risks, missing
               input validation, insecure dependencies, auth/authorization issues)
            3. Code quality & maintainability (duplication, complexity, naming,
               error handling, dead code)
            4. Style & convention consistency across the codebase
            5. Missing or inadequate test coverage

            Output format:
            - Group findings into 🔴 Critical / 🟡 Warnings / 🟢 Suggestions
            - For each finding: file path, line number (if applicable), the issue,
              and a concrete suggested fix
            - End with a short summary and an overall verdict

            Post the result as a comment on this pull request. Do not modify any files.
          allowed_tools: "Read,Grep,Glob,Bash(git log:*),Bash(git diff:*)"
          # claude_args lets you pin a model version if you want reproducibility:
          # claude_args: "--model claude-sonnet-4-6"
